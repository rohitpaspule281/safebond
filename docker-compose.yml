version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://safebond:safebond@postgres:5432/safebond
      CHROMA_MODE: local
      CHROMA_PERSIST_DIRECTORY: /app/chroma
      DB_AUTO_CREATE_TABLES: "true"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - chroma_data:/app/chroma
    working_dir: /app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: safebond
      POSTGRES_USER: safebond
      POSTGRES_PASSWORD: safebond
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safebond -d safebond"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  frontend_node_modules:
  postgres_data:
  chroma_data:
